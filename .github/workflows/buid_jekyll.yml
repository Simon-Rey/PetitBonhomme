name: Build and push Jekyll

on:
  push:
    branches: ["main"]

  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "jekyll_build"
  cancel-in-progress: false

jobs:
  push_docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # For pushing changes
      pages: write     # For deploying to GitHub Pages
      id-token: write  # Required by actions/deploy-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Specify your Ruby version
          bundler-cache: true  # Caches the gems for faster builds

      - name: Install Jekyll and plugins
        run: |
          cd petitbonhomme
          gem install jekyll
          gem install bundler
          bundle install  # Assumes there is a Gemfile in the repository

      - name: Build with Jekyll
        run: |
          cd petitbonhomme
          bundle exec jekyll build --baseurl "https://simon-rey.github.io/PetitBonhomme"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
        with:
          branch: main
          folder: ./_site
